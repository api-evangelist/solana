description: >-
  The Solana JSON-RPC OpenAPI declares no securitySchemes. The public cluster endpoints
  (api.mainnet-beta.solana.com, api.devnet.solana.com, api.testnet.solana.com) require no API
  key and no authentication — they are open, shared, rate-limited infrastructure not intended
  for production. Authenticated access is provided by third-party RPC providers (Helius,
  QuickNode, Triton, Alchemy, Syndica, GetBlock, etc.), which typically authenticate via an
  API key embedded in the request URL path/query or a header. Those keys are provider-specific
  and not part of the Solana protocol.
