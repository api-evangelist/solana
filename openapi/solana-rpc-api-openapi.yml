    InflationGovernorResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          type: object
          properties:
            initial:
              type: number
              format: double
              description: Initial inflation percentage from time 0
            terminal:
              type: number
              format: double
              description: Terminal inflation percentage
            taper:
              type: number
              format: double
              description: Rate per year at which inflation is lowered
            foundation:
              type: number
              format: double
              description: Percentage of total inflation allocated to the foundation
            foundationTerm:
              type: number
              format: double
              description: Duration of foundation pool inflation in years
        error:
          $ref: '#/components/schemas/JsonRpcError'

    InflationRateResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          type: object
          properties:
            total:
              type: number
              format: double
              description: Total inflation
            validator:
              type: number
              format: double
              description: Inflation allocated to validators
            foundation:
              type: number
              format: double
              description: Inflation allocated to the foundation
            epoch:
              type: integer
              format: int64
              description: Epoch for which these values are valid
        error:
          $ref: '#/components/schemas/JsonRpcError'

    InflationRewardResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          type: array
          items:
            nullable: true
            type: object
            properties:
              epoch:
                type: integer
                format: int64
                description: Epoch for which reward occurred
              effectiveSlot:
                type: integer
                format: int64
                description: The slot in which the rewards are effective
              amount:
                type: integer
                format: int64
                description: Reward amount in lamports
              postBalance:
                type: integer
                format: int64
                description: Post balance of the account in lamports
              commission:
                type: integer
                nullable: true
                description: Vote account commission when the reward was credited
        error:
          $ref: '#/components/schemas/JsonRpcError'

    SupplyResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          example: "2.0"
        id:
          oneOf:
            - type: integer
            - type: string
        result:
          type: object
          properties:
            context:
              $ref: '#/components/schemas/RpcContext'
            value:
              type: object
              properties:
                total:
                  type: integer
                  format: int64
                  description: Total supply in lamports
                circulating:
                  type: integer
                  format: int64
                  description: Circulating supply in lamports
                nonCirculating:
                  type: integer
                  format: int64
                  description: Non-circulating supply in lamports
                nonCirculatingAccounts:
                  type: array
                  items:
                    type: string
                  description: Array of account addresses of non-circulating accounts
        error:
          $ref: '#/components/schemas/JsonRpcError'
